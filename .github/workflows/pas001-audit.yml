name: PAS-001 Final Audit

on:
  push:
    branches:
      - agent/pas-001-auditoria-final-prontidao
    paths:
      - scripts/audit_pas001.py
      - .github/workflows/pas001-audit.yml

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/pas-001-auditoria-final-prontidao
          fetch-depth: 0
      - name: Run PAS-001 audit
        run: python scripts/audit_pas001.py
      - name: Commit audit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pas001-audit-output.json
          git diff --cached --quiet && exit 0
          git commit -m "Registrar evidências mecânicas da auditoria PAS-001"
          git push
