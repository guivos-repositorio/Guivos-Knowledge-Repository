name: Publish GKR Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Export PDF from printable site
        run: |
          mkdir -p exports
          chromium-browser --headless --disable-gpu --no-sandbox --print-to-pdf=exports/gkr.pdf file://$PWD/site/print_page/index.html || chromium --headless --disable-gpu --no-sandbox --print-to-pdf=exports/gkr.pdf file://$PWD/site/print_page/index.html

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: gkr-pdf
          path: exports/gkr.pdf

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
