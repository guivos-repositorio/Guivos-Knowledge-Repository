name: Refine PAS-001 Audit

on:
  push:
    branches:
      - agent/pas-001-auditoria-final-prontidao
    paths:
      - scripts/refine_pas001_audit_tail.py
      - .github/workflows/refine-pas001-audit.yml

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pas-001-auditoria-final-prontidao
      - name: Refine audit tail
        run: python scripts/refine_pas001_audit_tail.py
      - name: Validate numbered sections
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          text = Path('docs/product-architecture/pas-001-guivos-journey-auditoria-final-prontidao.md').read_text(encoding='utf-8')
          nums = [int(x) for x in re.findall(r'^# (\d+)\.', text, re.M)]
          assert nums == list(range(4851, 4926)), (nums[:3], nums[-3:], len(nums))
          assert text.count('# 4906. Decisão formal') == 1
          assert text.count('# 4925. Encerramento') == 1
          assert 'Ready for consolidation — PAS-001 1.0.0 editorial consolidation authorized' in text
          assert 'O `PAS-001` permanece `Draft 0.5.0`' in text
          print('audit editorial validation passed')
          PY
      - name: Commit refinement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/product-architecture/pas-001-guivos-journey-auditoria-final-prontidao.md
          git diff --cached --quiet && exit 0
          git commit -m "Refinar encerramento da auditoria final do PAS-001"
          git push
