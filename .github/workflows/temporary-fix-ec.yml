name: Temporary EC Consistency Fix

on:
  push:
    branches:
      - agent/evolucao-continua-fundamentos

permissions:
  contents: write

concurrency:
  group: temporary-ec-consistency-fix
  cancel-in-progress: false

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/evolucao-continua-fundamentos
          fetch-depth: 0

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply consistency correction
        run: |
          set -euo pipefail
          python tools/fix_ec_foundation_consistency.py

      - name: Validate corrected markers
        run: |
          set -euo pipefail
          grep -F '## Capacidade 08 concluída' docs/product-architecture/index.md
          grep -F 'a Capacidade 09 — Evolução Contínua está `In progress — 20%`' README.md
          grep -F -- '- identificação de mudança, candidatura e baseline;' README.md
          grep -F '| PAS-001-EXP-EVENT-001 | Active 1.0.0 |' docs/project/knowledge-board.md
          grep -F '| PAS-001-EXP-INTEGRATION-001 | Active 1.0.0 |' docs/project/knowledge-board.md
          grep -F '| PAS-001-EXP-CONTRACT-001 | Active 1.0.0 |' docs/project/knowledge-board.md
          grep -F '| PAS-001-EC-FOUNDATION-001 | Active 1.0.0 |' docs/project/knowledge-board.md

      - name: Commit correction
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/product-architecture/index.md README.md docs/project/knowledge-board.md
          git commit -m 'docs(sync): corrigir consistencia final da Evolucao Continua'

      - name: Remove temporary correction executor
        run: |
          set -euo pipefail
          rm -f tools/fix_ec_foundation_consistency.py .github/workflows/temporary-fix-ec.yml
          git add -A
          git commit -m 'chore(sync): remover corretor temporario'
          git push origin HEAD:agent/evolucao-continua-fundamentos
