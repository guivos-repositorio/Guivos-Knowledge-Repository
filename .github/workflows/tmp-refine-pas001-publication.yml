name: Refine PAS-001 published wording

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/tmp-refine-pas001-publication.yml'

permissions:
  contents: write

jobs:
  refine:
    if: github.head_ref == 'agent/pas-001-publication'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pas-001-publication
          fetch-depth: 1
          show-progress: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove residual candidate wording and validate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/product-architecture/pas-001-guivos-journey.md')
          text = path.read_text(encoding='utf-8')
          old = 'A publicação futura do `PAS-001 1.0.0` não deverá:'
          new = 'A publicação e a manutenção do `PAS-001 1.0.0` não deverão:'
          if text.count(old) != 1:
              raise SystemExit(f'expected one residual phrase, found {text.count(old)}')
          text = text.replace(old, new, 1)
          forbidden = [
              'publication not yet authorized',
              '# 29. Critérios de aceite da edição candidata',
              'status: candidate',
              'version: 1.0.0-rc.1',
              'A publicação futura do `PAS-001 1.0.0`',
          ]
          for item in forbidden:
              if item in text:
                  raise SystemExit(f'forbidden canonical wording remains: {item}')
          if text.count('Functionally complete |') != 9:
              raise SystemExit('capability map count changed')
          if '# 28. Comportamentos globais proibidos' not in text:
              raise SystemExit('final architectural section missing')
          path.write_text(text, encoding='utf-8')
          PY
          git diff --check
          git config user.name "guivos-repositorio"
          git config user.email "guivos-repositorio@users.noreply.github.com"
          git add docs/product-architecture/pas-001-guivos-journey.md
          git commit -m "Refine PAS-001 published preservation wording"
          git push origin HEAD:agent/pas-001-publication
