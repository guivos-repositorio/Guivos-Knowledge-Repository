name: Sincronizar ciclo de vida de Experiencias

on:
  push:
    branches:
      - agent/experiencias-ciclo-de-vida
    paths:
      - .github/trigger/exp-lifecycle.txt

permissions:
  contents: write

jobs:
  synchronize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/experiencias-ciclo-de-vida
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "guivos-repositorio"
          git config user.email "guivosbrasil@gmail.com"

      - name: Validar e aplicar sincronizacao
        run: |
          python -m py_compile .github/scripts/apply_exp_lifecycle_sync.py
          python .github/scripts/apply_exp_lifecycle_sync.py

      - name: Arquitetura de Produtos
        run: |
          git add docs/product-architecture/index.md
          git commit -m "docs(arquitetura): consolidar ciclo de vida de Experiencias"

      - name: Roadmap
        run: |
          git add docs/roadmap.md
          git commit -m "docs(roadmap): avancar ciclo de vida de Experiencias"

      - name: Knowledge Board
        run: |
          git add docs/project/knowledge-board.md
          git commit -m "docs(board): registrar ciclo de vida de Experiencias"

      - name: Matriz Canonica
        run: |
          git add docs/project/canonical-consolidation-matrix.md
          git commit -m "docs(canon): consolidar ciclo de vida de Experiencias"

      - name: README
        run: |
          git add README.md
          git commit -m "docs(readme): registrar ciclo de vida de Experiencias"

      - name: Pagina inicial
        run: |
          git add docs/index.md
          git commit -m "docs(index): atualizar ciclo de vida de Experiencias"

      - name: Navegacao do site
        run: |
          git add mkdocs.yml
          git commit -m "docs(site): adicionar ciclo de vida de Experiencias"

      - name: Changelog
        run: |
          git add CHANGELOG.md
          git commit -m "docs(changelog): registrar ciclo de vida de Experiencias"

      - name: Remover automacao temporaria
        run: |
          rm -f .github/trigger/exp-lifecycle.txt
          rm -f .github/scripts/apply_exp_lifecycle_sync.py
          rm -f .github/workflows/exp-lifecycle-sync.yml
          git add -A .github/trigger/exp-lifecycle.txt .github/scripts/apply_exp_lifecycle_sync.py .github/workflows/exp-lifecycle-sync.yml
          git commit -m "chore(sync): remover automacao temporaria"

      - name: Validar estado final
        run: |
          test -f docs/product-architecture/pas-001-experiencias-ciclo-de-vida.md
          grep -q "PAS-001-EXP-LIFECYCLE-001" docs/product-architecture/index.md
          grep -q "In progress.*40%" README.md
          grep -q "version: 10.2.0" docs/roadmap.md
          grep -q "version: 10.2.0" docs/project/knowledge-board.md
          grep -q "version: 1.11.0" docs/project/canonical-consolidation-matrix.md
          grep -q "0.39.0 — Experiences Lifecycle" CHANGELOG.md
          git status --short

      - name: Publicar commits
        run: git push origin HEAD:agent/experiencias-ciclo-de-vida
