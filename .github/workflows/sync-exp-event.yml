name: Sync EXP Events

on:
  pull_request:
    types:
      - reopened
    branches:
      - main
    paths:
      - .github/trigger/exp-event.txt

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Diagnose synchronization
        shell: bash
        run: |
          set +e
          python tools/sync_exp_event.py > /tmp/sync-exp-event.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 40 /tmp/sync-exp-event.log > .github/trigger/exp-event-error.txt
            git config user.name "guivos-repositorio"
            git config user.email "guivosbrasil@gmail.com"
            git add .github/trigger/exp-event-error.txt
            git commit -m "chore(sync): registrar diagnostico dos eventos"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi
          echo "synchronization completed" > .github/trigger/exp-event-error.txt
          git config user.name "guivos-repositorio"
          git config user.email "guivosbrasil@gmail.com"
          git add .github/trigger/exp-event-error.txt
          git commit -m "chore(sync): registrar diagnostico dos eventos"
          git push origin HEAD:${{ github.head_ref }}
