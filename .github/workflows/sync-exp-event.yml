name: Sync EXP Events

on:
  push:
    branches:
      - agent/experiencias-eventos-final
    paths:
      - .github/trigger/exp-event.txt

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout execution branch
        uses: actions/checkout@v4
        with:
          ref: agent/experiencias-eventos-final
          fetch-depth: 0

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize normative artifacts
        shell: bash
        run: |
          set +e
          python - <<'PY' > /tmp/sync-exp-event.log 2>&1
          import base64
          import zlib
          from pathlib import Path

          parts = sorted(Path("tools/sync_exp_event_payload").glob("part-*.txt"))
          if len(parts) != 6:
              raise RuntimeError(f"esperadas 6 partes do payload, encontradas {len(parts)}")
          payload = "".join(path.read_text(encoding="utf-8").strip() for path in parts)
          source = zlib.decompress(base64.b64decode(payload)).decode("utf-8")
          old_pattern = 'r"## Próximo ponto de retomada\\n\\n.*\\Z"'
          new_pattern = 'r"## (?:Próximo ponto de retomada|Próxima atividade)\\n\\n.*\\Z"'
          if source.count(old_pattern) != 1:
              raise RuntimeError("padrão de retomada do Knowledge Board não encontrado de forma única")
          source = source.replace(old_pattern, new_pattern, 1)
          virtual_file = Path("tools/sync_exp_event_payload.py").resolve()
          namespace = {"__file__": str(virtual_file), "__name__": "__main__"}
          exec(compile(source, str(virtual_file), "exec"), namespace)
          PY
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 40 /tmp/sync-exp-event.log > .github/trigger/exp-event-error.txt
            git config user.name "guivos-repositorio"
            git config user.email "guivosbrasil@gmail.com"
            git add .github/trigger/exp-event-error.txt
            git commit -m "chore(sync): registrar diagnostico dos eventos" || true
            git push origin HEAD:agent/experiencias-eventos-final
            exit "$status"
          fi
          rm -f .github/trigger/exp-event-error.txt

      - name: Configure Git
        run: |
          git config user.name "guivos-repositorio"
          git config user.email "guivosbrasil@gmail.com"

      - name: Commit normative contract
        run: |
          git add docs/product-architecture/pas-001-experiencias-eventos-funcionais.md .github/trigger/exp-event-error.txt
          git commit -m "docs(experiencias): consolidar eventos funcionais"

      - name: Commit architecture and governance
        run: |
          git add docs/product-architecture/index.md docs/roadmap.md docs/project/knowledge-board.md docs/project/canonical-consolidation-matrix.md
          git commit -m "docs(canon): sincronizar eventos de Experiencias"

      - name: Commit repository entry points
        run: |
          git add README.md docs/index.md mkdocs.yml
          git commit -m "docs(site): publicar eventos de Experiencias"

      - name: Commit changelog
        run: |
          git add CHANGELOG.md
          git commit -m "docs(changelog): registrar eventos de Experiencias"

      - name: Push synchronized commits
        run: git push origin HEAD:agent/experiencias-eventos-final
