name: Apply approved OA integration update

on:
  push:
    branches:
      - oa-integration-approved-20260715

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "guivos-repositorio"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update README and repository index
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f"Missing marker: {label}")
              return text.replace(old, new, 1)

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")
          text = replace_once(text,
              "- **Capacidade ativa:** 06 — Oportunidades Ativas, `In progress`, 80%",
              "- **Capacidade ativa:** 06 — Oportunidades Ativas, `In progress`, 90%",
              "README active progress")
