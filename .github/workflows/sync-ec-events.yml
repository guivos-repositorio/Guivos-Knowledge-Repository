name: Sync Continuous Evolution Functional Events

on:
  push:
    branches:
      - agent/evolucao-continua-eventos-funcionais
    paths:
      - .github/sync-ec-events-trigger

permissions:
  contents: write

concurrency:
  group: sync-ec-events
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/evolucao-continua-eventos-funcionais
          fetch-depth: 0

      - name: Synchronize canonical artifacts
        run: python tools/sync_ec_events.py

      - name: Commit documentation synchronization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md README.md docs/index.md docs/product-architecture/index.md docs/project/canonical-consolidation-matrix.md docs/project/knowledge-board.md docs/roadmap.md mkdocs.yml
          git commit -m "docs: sincronizar eventos funcionais da evolução contínua"

      - name: Remove temporary executor
        run: |
          rm .github/workflows/sync-ec-events.yml
          rm tools/sync_ec_events.py
          rm .github/sync-ec-events-trigger
          git add -A
          git commit -m "chore: remover executor temporário dos eventos funcionais"

      - name: Push commits
        run: git push origin HEAD:agent/evolucao-continua-eventos-funcionais
