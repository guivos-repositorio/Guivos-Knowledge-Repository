name: Sync PAS Reconciliation

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.ref == 'agent/pas-001-reconciliacao-fechamento'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Synchronize canonical artifacts
        run: python scripts/sync_pas_recon.py
