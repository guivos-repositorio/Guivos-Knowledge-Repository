name: Sync CC Final Contract

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  synchronize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/captura-contexto-contrato-final
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Adapt legacy Knowledge Board anchor
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/sync_cc_contract.py")
          text = path.read_text(encoding="utf-8")
          old = '''text = replace_regex(
              text,
              r"Retomar nos \\\*\\\*KPIs, Guardrails, Cenários e Contrato Final da Capacidade 01 — Captura de Contexto\\\*\\\*\\\.",
              "Retomar na **Auditoria Final de Prontidão e Consolidação Editorial do PAS-001 — Guivos Journey**.",
              "board resumption",
          )'''
          new = '''text = replace_exact(
              text,
              "Consolidar **KPIs, guardrails, baseline funcional, painel de saúde, níveis de desempenho, cenários e contrato funcional final da Capacidade 09 — Evolução Contínua**, incluindo critérios de conclusão, lacunas bloqueantes e não bloqueantes e critérios de reabertura.",
              "Executar a **Auditoria Final de Prontidão e Consolidação Editorial do PAS-001 — Guivos Journey**, incluindo autoridade documental, supersessão, estados, perguntas centrais, contratos finais, mapa de capacidades, links, navegação e decisão formal de publicação.",
              "board next activity",
          )'''
          if old not in text:
              raise SystemExit("legacy board patch anchor not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Synchronize canonical artifacts
        id: sync
        shell: bash
        run: |
          set +e
          python scripts/sync_cc_contract.py > /tmp/sync-cc-contract.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            git checkout HEAD -- .github/workflows/sync-cc-contract.yml scripts/sync_cc_contract.py
            rm -f sync-cc-contract-error.txt
          else
            git reset --hard HEAD
            tail -n 80 /tmp/sync-cc-contract.log > sync-cc-contract-error.txt
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit synchronized artifacts or diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          if [ "${{ steps.sync.outputs.status }}" = "0" ]; then
            git commit -m "Synchronize Capture Context final contract"
          else
            git commit -m "Record Capture Context synchronization error"
          fi
          git push origin HEAD:agent/captura-contexto-contrato-final

      - name: Fail after diagnostic
        if: steps.sync.outputs.status != '0'
        run: exit 1
