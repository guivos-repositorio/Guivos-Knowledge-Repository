name: Sync CC Final Contract

on:
  push:
    branches:
      - agent/captura-contexto-contrato-final
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  synchronize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/captura-contexto-contrato-final
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize canonical artifacts
        id: sync
        shell: bash
        run: |
          set +e
          python scripts/sync_cc_contract.py > /tmp/sync-cc-contract.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            tail -n 80 /tmp/sync-cc-contract.log > sync-cc-contract-error.txt
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit synchronized artifacts or diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          if [ "${{ steps.sync.outputs.status }}" = "0" ]; then
            git commit -m "Synchronize Capture Context final contract"
          else
            git commit -m "Record Capture Context synchronization error"
          fi
          git push origin HEAD:agent/captura-contexto-contrato-final

      - name: Fail after diagnostic
        if: steps.sync.outputs.status != '0'
        run: exit 1
