name: Sync EXP Integrations

on:
  pull_request:
    types:
      - opened
    branches:
      - main
    paths:
      - .github/trigger/exp-integration.txt

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Synchronize normative artifacts
        run: python tools/sync_exp_integration.py

      - name: Configure Git
        run: |
          git config user.name "guivos-repositorio"
          git config user.email "guivosbrasil@gmail.com"

      - name: Commit architecture and governance
        run: |
          git add docs/product-architecture/index.md docs/roadmap.md docs/project/knowledge-board.md docs/project/canonical-consolidation-matrix.md
          git commit -m "docs(canon): sincronizar integracoes de Experiencias"

      - name: Commit repository entry points
        run: |
          git add README.md docs/index.md mkdocs.yml
          git commit -m "docs(site): publicar integracoes de Experiencias"

      - name: Commit changelog
        run: |
          git add CHANGELOG.md
          git commit -m "docs(changelog): registrar integracoes de Experiencias"

      - name: Remove temporary executor
        run: |
          rm -f .github/workflows/sync-exp-integration.yml
          rm -f .github/trigger/exp-integration.txt
          rm -f tools/sync_exp_integration.py
          git add -A
          git commit -m "chore(sync): remover executor temporario"

      - name: Push synchronized commits
        run: git push origin HEAD:${{ github.head_ref }}
