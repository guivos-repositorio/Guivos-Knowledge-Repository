name: Sync Capture Context Lifecycle

on:
  pull_request:
    branches:
      - main
    paths:
      - docs/product-architecture/pas-001-captura-de-contexto-ciclo-de-vida.md
      - scripts/sync_cc_lifecycle.py
      - .github/workflows/sync-cc-lifecycle.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.ref == 'agent/captura-contexto-ciclo-de-vida'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Synchronize canonical artifacts
        run: python scripts/sync_cc_lifecycle.py
