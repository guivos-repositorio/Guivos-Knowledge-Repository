name: Sync EC Lifecycle

on:
  push:
    branches:
      - agent/evolucao-continua-ciclo-de-vida

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply synchronization
        run: python tools/sync_ec_lifecycle.py

      - name: Commit synchronized documents
        run: |
          git add CHANGELOG.md README.md docs/index.md docs/product-architecture/index.md docs/project/canonical-consolidation-matrix.md docs/project/knowledge-board.md docs/roadmap.md mkdocs.yml
          git commit -m "docs: sincroniza ciclo de vida da evolução contínua"

      - name: Validate synchronized state
        run: python tools/sync_ec_lifecycle.py --check

      - name: Remove temporary executor
        run: |
          rm -f tools/sync_ec_lifecycle.py .github/workflows/sync-ec-lifecycle.yml
          git add -A
          git commit -m "chore: remove executor temporário do ciclo de vida"

      - name: Push branch
        run: git push origin HEAD:agent/evolucao-continua-ciclo-de-vida
