name: Sync EC View

on:
  push:
    branches:
      - agent/evolucao-continua-visualizacao-controle
    paths:
      - .github/trigger/ec-view-sync.txt

permissions:
  contents: write

concurrency:
  group: sync-ec-view-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/evolucao-continua-visualizacao-controle
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "guivos-repositorio"
          git config user.email "guivos-repositorio@users.noreply.github.com"

      - name: Synchronize canonical artifacts
        run: python tools/sync_ec_view.py

      - name: Validate synchronization
        run: python tools/sync_ec_view.py --check

      - name: Commit canonical synchronization
        run: |
          git add CHANGELOG.md README.md docs/index.md docs/product-architecture/index.md docs/project/canonical-consolidation-matrix.md docs/project/knowledge-board.md docs/roadmap.md mkdocs.yml
          git commit -m "Sincroniza visualização e controle da Evolução Contínua"

      - name: Remove temporary executor
        run: |
          rm -f tools/sync_ec_view.py .github/workflows/sync-ec-view.yml .github/trigger/ec-view-sync.txt
          rmdir .github/trigger 2>/dev/null || true
          git add -A
          git commit -m "Remove executor temporário da sincronização EC-VIEW"

      - name: Push changes
        run: git push origin HEAD:agent/evolucao-continua-visualizacao-controle
