name: Sync Continuous Evolution Integration

on:
  push:
    branches:
      - agent/evolucao-continua-integracoes-funcionais
    paths:
      - .github/ec-integration-trigger.txt

permissions:
  contents: write

concurrency:
  group: sync-ec-integration
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/evolucao-continua-integracoes-funcionais
          fetch-depth: 0

      - name: Apply canonical synchronization
        run: python .github/scripts/sync_ec_integration.py

      - name: Remove temporary executor
        run: |
          rm -f .github/scripts/sync_ec_integration.py
          rm -f .github/workflows/sync-ec-integration.yml
          rm -f .github/ec-integration-trigger.txt

      - name: Commit synchronized artifacts
        run: |
          git config user.name "guivos-repositorio"
          git config user.email "guivos-repositorio@users.noreply.github.com"
          git add README.md CHANGELOG.md docs/index.md docs/roadmap.md docs/product-architecture/index.md docs/project/knowledge-board.md docs/project/canonical-consolidation-matrix.md mkdocs.yml .github
          git diff --cached --quiet && exit 1
          git commit -m "Sincronizar integrações funcionais da Evolução Contínua"
          git push origin HEAD:agent/evolucao-continua-integracoes-funcionais
