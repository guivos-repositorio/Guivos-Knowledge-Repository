name: Sync Continuous Evolution Integration

on:
  push:
    branches:
      - agent/evolucao-continua-integracoes-funcionais
    paths:
      - .github/ec-integration-trigger.txt
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: sync-ec-integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/evolucao-continua-integracoes-funcionais
          fetch-depth: 0

      - name: Patch deterministic synchronization
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/sync_ec_integration.py')
          text = path.read_text(encoding='utf-8')

          old = 'text = insert_after_once(text, "| PAS-001-EC-EVENT-001 | Active 1.0.0 |", "\\n| PAS-001-EC-INTEGRATION-001 | Active 1.0.0 |", f"{path} governança integração")'
          new = 'text = replace_once(text, "| PAS-001-EC-EVENT-001 | Active 1.0.0 |\\n| GLPA-001 |", "| PAS-001-EC-EVENT-001 | Active 1.0.0 |\\n| PAS-001-EC-INTEGRATION-001 | Active 1.0.0 |\\n| GLPA-001 |", f"{path} governança integração")'
          if text.count(old) != 1:
              raise SystemExit('âncora temporária de governança não encontrada')
          text = text.replace(old, new, 1)

          focus_line = 'text = replace_once(text, "| Foco imediato | Consolidar as integrações funcionais da Capacidade 09 — Evolução Contínua |", "| Foco imediato | Consolidar KPIs, guardrails, baseline, cenários e contrato final da Capacidade 09 — Evolução Contínua |", f"{path} foco")'
          state_line = 'text = replace_once(text, "| Estado da capacidade ativa | `In progress — 80%` |", "| Estado da capacidade ativa | `In progress — 90%` |", f"{path} estado da capacidade")'
          if text.count(focus_line) != 1:
              raise SystemExit('âncora de foco não encontrada')
          text = text.replace(focus_line, focus_line + '\n' + state_line, 1)

          old_diag = '        raise RuntimeError(f"{file_path}: estado antigo remanescente")'
          new_diag = '        raise RuntimeError(f"{file_path}: estado antigo remanescente: {[line for line in content.splitlines() if chr(73)+chr(110)+chr(32)+chr(112)+chr(114)+chr(111)+chr(103)+chr(114)+chr(101)+chr(115)+chr(115)+chr(32)+chr(8212)+chr(32)+chr(56)+chr(48)+chr(37) in line]}")'
          if text.count(old_diag) != 1:
              raise SystemExit('âncora de diagnóstico não encontrada')
          path.write_text(text.replace(old_diag, new_diag, 1), encoding='utf-8')
          PY

      - name: Apply canonical synchronization
        run: |
          set +e
          python .github/scripts/sync_ec_integration.py > /tmp/ec-integration.log 2>&1
          status=$?
          cat /tmp/ec-integration.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/ec-integration.log .github/ec-integration-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/ec-integration-error.log
            git commit -m "chore: registrar falha de sincronização [skip ci]"
            git push origin HEAD:agent/evolucao-continua-integracoes-funcionais
            exit "$status"
          fi

      - name: Commit canonical artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/ec-integration-error.log
          git add README.md CHANGELOG.md docs/index.md docs/roadmap.md docs/product-architecture/index.md docs/project/knowledge-board.md docs/project/canonical-consolidation-matrix.md mkdocs.yml .github/ec-integration-error.log
          git diff --cached --quiet && exit 1
          git commit -m "docs: sincronizar integrações funcionais da evolução contínua"

      - name: Remove temporary executor
        run: |
          rm -f .github/scripts/sync_ec_integration.py
          rm -f .github/workflows/sync-ec-integration.yml
          rm -f .github/ec-integration-trigger.txt
          git add -A
          git commit -m "chore: remover executor temporário das integrações de evolução"

      - name: Push commits
        run: git push origin HEAD:agent/evolucao-continua-integracoes-funcionais
