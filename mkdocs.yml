site_name: Guivos Knowledge Repository
site_description: Base oficial de conhecimento e arquitetura da Guivos
site_author: Guivos
repo_name: guivos-repositorio/Guivos-Knowledge-Repository
repo_url: https://github.com/guivos-repositorio/Guivos-Knowledge-Repository
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: black
      accent: blue

plugins:
  - search
  - mermaid2
  - print-site:
      add_to_navigation: true
      print_page_title: GKR — Versão para Impressão
      add_print_site_banner: false
      enumerate_headings: true
      enumerate_figures: true
      add_cover_page: true
      cover_page_template: docs/assets/templates/cover-page.tpl
      path_to_pdf: exports/gkr.pdf
      include_css: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

